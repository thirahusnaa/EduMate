<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
            margin: 0;
        }
        .container-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 700px;
            height: 450px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }
        .summary-box {
            background: #f1f1f1;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            width: 100%;
            flex-grow: 1; /* Put all the button at bottom */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100px;
        }
        .btn-primary, .btn-secondary {
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            transition: 0.3s;
            width: 120px;
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .btn-secondary {
            background-color: #007bff;
            border: none;
        }
        .btn-secondary:hover {
            background-color: #0056b3;
        }
        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container-box">
        <h3>EduMate Summary</h3>
        <div class="summary-box" id="summary-content">
            <p>Loading summary...</p>
        </div>
        <div class="button-group">
            <button class="btn btn-secondary" onclick="goBack()">Back</button>
            <button class="btn btn-primary" onclick="goToPage('QuizFrontEnd.html')">Quiz</button>
            <button class="btn btn-primary" onclick="goToPage('FlashcardFrontEnd.html')">Flashcard</button>
        </div>
    </div>

    <script>
         // Function to navigate to another page
        function goToPage(page) {
            window.location.href = page;
        }
        
        // Function to go back to UploadFrontEnd.html
        function goBack() {
            window.location.href = 'UploadFrontEnd.html';
        }
        // Fetch summary from backend when page loads
        document.addEventListener("DOMContentLoaded", function() { //Load the backend
            fetch('/api/summary')  // Backend URL for SUMMARY
                .then(response => response.json())
                .then(data => {
                    document.getElementById("summary-content").innerHTML = 
                        `<p>${data.summary}</p>`;
                })
                .catch(error => {
                    document.getElementById("summary-content").innerHTML = 
                        "<p class='text-danger'>Failed to load summary.</p>";
                });
        });
    </script>
</body>
</html>
