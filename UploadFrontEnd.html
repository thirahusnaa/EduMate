<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMate Beta 0.1</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .upload-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 400px;
        }
        .logo {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .logo img {
            width: 150px;
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            transition: 0.3s;
            width: 100%;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="upload-container">
        <div class="logo">
            <img src="EduMate logo.jpg" alt="EduMate Logo">
        </div>

        <h2 class="mb-3">EduMate Beta 0.1</h2>
        <p>Upload book/slide here</p>
        <form id="upload-form" enctype="multipart/form-data">
            <input type="file" id="file-input" class="form-control mb-3" accept=".pdf,.png,.jpg,.jpeg,.doc,.docx,.ppt,.pptx,.txt">
            <button type="submit" class="btn btn-primary">Upload</button>
        </form>
        <div id="upload-status" class="mt-3"></div>
    </div>

    <script>
        $(document).ready(function(){
            $('#upload-form').submit(function(event){
                event.preventDefault();
                let file = $('#file-input')[0].files[0];

                if (!file) {
                    $('#upload-status').html('<p class="text-danger">Please select a file.</p>');
                    return;
                }

                let formData = new FormData();
                formData.append("file", file);

                $('#upload-status').html('<p class="text-info">Uploading...</p>');

                $.ajax({
                    url: '/',  // Sends file to the backend to store in DB
                    type: 'POST',
                    data: formData,
                    contentType: false,
                    processData: false,
                    success: function(response) {
                        $('#upload-status').html('<p class="text-success">File uploaded successfully!</p>');
                        
                        // Redirect to next page for summary
                        setTimeout(function() {
                            window.location.href = "SummaryFrontEnd.html";
                        }, 2000);
                    },
                    error: function() {
                        $('#upload-status').html('<p class="text-danger">Upload failed. Try again.</p>');
                    }
                });
            });
        });
    </script>
</body>
</html>
